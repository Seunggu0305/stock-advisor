name: Daily Stock Screener

on:
  schedule:
    # KST 07:00 월~토 = UTC 22:00 일~금
    - cron: '0 22 * * 0-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env (if needed)
        run: |
          if [ ! -f .env ]; then
            echo "FRED_API_KEY=${{ secrets.FRED_API_KEY }}" > .env
          fi

      - name: Run daily screener
        run: python -m scheduler.daily_screener --force
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_results/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily screen: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin master
            git push
          fi
